plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

import java.text.SimpleDateFormat

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
def releaseKeystoreFile = rootProject.file("upload-keystore.jks")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(new InputStreamReader(stream, "UTF-8"))
    }
    def bomStorePasswordKey = keystoreProperties.stringPropertyNames().find { it.startsWith("\uFEFF") }
    if (bomStorePasswordKey != null) {
        def value = keystoreProperties.getProperty(bomStorePasswordKey)
        keystoreProperties.remove(bomStorePasswordKey)
        keystoreProperties.setProperty(bomStorePasswordKey.replace("\uFEFF", ""), value)
    }
}

android {
    namespace "com.brokenveilprotocol.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties["keyAlias"]
            keyPassword keystoreProperties["keyPassword"]
            storeFile releaseKeystoreFile
            storePassword keystoreProperties["storePassword"]
        }
    }

    defaultConfig {
        applicationId "com.brokenveilprotocol.app"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        multiDexEnabled true
        manifestPlaceholders += [
            appAuthRedirectScheme: "com.brokenveilprotocol.app"
        ]
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = (keystorePropertiesFile.exists() && releaseKeystoreFile.exists())
                    ? signingConfigs.release
                    : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    bundle {
        abi {
            enableSplit = true
        }
    }
}

tasks.register("renameReleaseApk") {
    doLast {
        def flutterApkDir = file("$rootDir/../build/app/outputs/flutter-apk")
        def releaseApk = file("$flutterApkDir/app-release.apk")
        if (!releaseApk.exists()) {
            return
        }
        def timestamp = new SimpleDateFormat("yyyyMMddHHmmss").format(new Date())
        copy {
            from releaseApk
            into flutterApkDir
            rename { "BrokenVeilProtocol-${timestamp}.apk" }
        }
    }
}

tasks.matching { it.name == "assembleRelease" }.configureEach {
    finalizedBy("renameReleaseApk")
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
