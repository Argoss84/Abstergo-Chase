plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

import java.text.SimpleDateFormat

android {
    namespace "com.abstergo.chase"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.abstergo.chase"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        multiDexEnabled true
        manifestPlaceholders += [
            appAuthRedirectScheme: "com.abstergo.chase"
        ]
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Keep debug signing for local release tests; replace with production
            // signing config in CI/release pipeline.
            signingConfig signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    bundle {
        abi {
            enableSplit = true
        }
    }
}

tasks.register("renameReleaseApk") {
    doLast {
        def flutterApkDir = file("$rootDir/../build/app/outputs/flutter-apk")
        def releaseApk = file("$flutterApkDir/app-release.apk")
        if (!releaseApk.exists()) {
            return
        }
        def timestamp = new SimpleDateFormat("yyyyMMddHHmmss").format(new Date())
        copy {
            from releaseApk
            into flutterApkDir
            rename { "AbstergoChase-${timestamp}.apk" }
        }
    }
}

tasks.matching { it.name == "assembleRelease" }.configureEach {
    finalizedBy("renameReleaseApk")
}

flutter {
    source '../..'
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
}
