services:
  bddtester:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.bddtester
    restart: unless-stopped
    ports:
      - '${BDDTESTER_PUBLISH_PORT:-8081}:80'
    environment:
      NGINX_ENVSUBST_TEMPLATE_DIR: /usr/share/nginx/html
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: .template.js
      NGINX_ENVSUBST_OUTPUT_DIR: /usr/share/nginx/html
      API_BASE_URL: ${API_BASE_URL:-http://localhost:5175}
      COGNITO_DOMAIN: ${COGNITO_DOMAIN:?define COGNITO_DOMAIN}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:?define COGNITO_CLIENT_ID}
      COGNITO_REDIRECT_URI: ${COGNITO_REDIRECT_URI:-http://localhost:8081}
      COGNITO_SCOPE: ${COGNITO_SCOPE:-openid email profile}
