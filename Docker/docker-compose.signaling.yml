# Signalisation WebSocket uniquement (Server/server.js — Socket.IO)
# Depuis ce dossier :
#   docker compose -f docker-compose.signaling.yml up --build
# Avec fichier d’env dédié :
#   docker compose -f docker-compose.signaling.yml --env-file env.signaling.example up --build

services:
  signaling:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.signaling
    restart: unless-stopped
    ports:
      - '${SIGNALING_PUBLISH_PORT:-5174}:5174'
    environment:
      SIGNALING_PORT: 5174
      SOCKET_IO_PATH: /socket.io
      # Persistance activée par défaut vers ServerBDD exposé sur l'hôte.
      DISABLE_BDD: ${DISABLE_BDD:-false}
      BDD_URL: ${BDD_URL:-http://host.docker.internal:5175}
