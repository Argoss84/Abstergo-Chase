# Déploiement stack Abstergo Chase (depuis ce dossier : docker compose up --build)
# Contexte de build : répertoire parent du dossier Docker (racine du dépôt).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abstergo}
      POSTGRES_USER: ${POSTGRES_USER:-abstergo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-abstergo} -d ${POSTGRES_DB:-abstergo}']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  serverbdd:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.serverbdd
    restart: unless-stopped
    ports:
      - '${SERVERBDD_PUBLISH_PORT:-5175}:5175'
    environment:
      PORT: 5175
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-abstergo}
      DATABASE_USER: ${POSTGRES_USER:-abstergo}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}
      DATABASE_SSL: 'false'
      COGNITO_ISSUER: ${COGNITO_ISSUER:?define COGNITO_ISSUER}
      COGNITO_AUDIENCE: ${COGNITO_AUDIENCE:?define COGNITO_AUDIENCE}
    depends_on:
      db:
        condition: service_healthy

  signaling:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.signaling
    restart: unless-stopped
    ports:
      - '${SIGNALING_PUBLISH_PORT:-5174}:5174'
    environment:
      SIGNALING_PORT: 5174
      BDD_URL: http://serverbdd:5175
      SOCKET_IO_PATH: /socket.io
    depends_on:
      - serverbdd

  web:
    build:
      context: ..
      dockerfile: Docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5175}
        VITE_SIGNALING_URL: ${VITE_SIGNALING_URL:-http://localhost:5174}
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-}
    restart: unless-stopped
    ports:
      - '${WEB_PUBLISH_PORT:-8080}:80'
    depends_on:
      - signaling
      - serverbdd

volumes:
  db_data:
